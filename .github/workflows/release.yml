name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install NativeAOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Publish (NativeAOT, self-contained)
        run: dotnet publish QuakePatches/QuakePatches.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o publish/${{ matrix.rid }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd publish/linux-x64
          zip -r ../../QuakePatches-linux-x64.zip QuakePatches Patches

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path publish/win-x64/QuakePatches.exe,publish/win-x64/Patches -DestinationPath QuakePatches-win-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: QuakePatches-${{ matrix.rid }}
          path: QuakePatches-${{ matrix.rid }}.zip
          if-no-files-found: error

  release:
    name: Draft GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: QuakePatches-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: QuakePatches-*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true